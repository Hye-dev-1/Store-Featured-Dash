[build]
  publish = "public"
  functions = "netlify/functions"

# API redirect MUST come before SPA fallback
# force=true ensures it takes priority
[[redirects]]
  from = "/api/crawl"
  to = "/.netlify/functions/crawl"
  status = 200
  force = true

# Also handle direct function path just in case
[[redirects]]
  from = "/api/crawl/*"
  to = "/.netlify/functions/crawl"
  status = 200
  force = true

# SPA fallback — MUST be LAST
# Only applies to paths that don't match above
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
