<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Store Featured Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0f1117;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;padding:16px}
.w{max-width:1100px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.hdr h1{font-size:19px;font-weight:800}.hdr .sub{color:#777;font-size:11px;margin-top:2px}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.t{background:#1a1d27;border:1px solid #2a2d3a;cursor:pointer;font-weight:600;color:#888;transition:.2s;white-space:nowrap;border-radius:18px;padding:5px 14px;font-size:12px}
.t.a{background:#5B8DEF;border-color:#5B8DEF;color:#fff}
.t.sm{border-radius:7px;padding:5px 12px;font-size:11px}
/* Status */
.st{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding:7px 12px;background:#13151f;border:1px solid #2a2d3a;border-radius:7px;font-size:10px;color:#777}
.st .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* Summary */
.su{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.sc{background:#1a1d27;border:1px solid #2a2d3a;border-radius:10px;padding:10px 12px}
.sc .l{font-size:10px;color:#777;margin-bottom:3px}.sc .v{font-size:22px;font-weight:800}
/* Grid */
.g{display:grid;gap:10px}.g.two{grid-template-columns:1fr 1fr}.g.one{grid-template-columns:1fr}
.p{background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:12px}
.ph{display:flex;align-items:center;gap:7px;margin-bottom:10px}.pt{font-weight:700;font-size:14px}.ps{font-size:10px;color:#777}
/* Tab separator inside panel */
.tab-hdr{font-size:10px;font-weight:700;color:#5B8DEF;padding:6px 0 4px;margin-top:6px;border-top:1px solid #222530}
.tab-hdr.gp{color:#34A853}
/* Row */
.r{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;background:#13151f;margin-bottom:4px;border:1px solid #2a2d3a;position:relative;text-decoration:none;color:inherit;transition:background .15s}
.r:hover{background:#1a2030}
.r.nx{border:1.5px solid #B4E114;box-shadow:0 0 5px rgba(180,225,20,.12)}
.r.cm{border-color:rgba(255,184,0,.18)}
.r .rk{min-width:18px;color:#444;font-size:11px;font-weight:700;text-align:right}
.r .ic{width:34px;height:34px;border-radius:7px;object-fit:cover;background:#222530;flex-shrink:0;border:1px solid #2a2d3a}
.r .ph-ic{width:34px;height:34px;border-radius:7px;background:#222530;border:1px solid #2a2d3a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.r .inf{flex:1;min-width:0}
.r .nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r .mt{display:flex;gap:4px;align-items:center;margin-top:2px;flex-wrap:wrap}
.bdg{border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700}
.sl{font-size:8px;color:#555}.dv{font-size:8px;color:#555}
.sr{font-size:9px;color:#FFB800}
.tb-tag{font-size:7px;padding:1px 3px;border-radius:2px;font-weight:700;color:#fff}
.tb-tag.today{background:#5B8DEF}.tb-tag.games{background:#A05BEF}.tb-tag.feat{background:#34A853}
.nx-tag{position:absolute;right:5px;top:5px;font-size:7px;color:#B4E114;font-weight:700;background:rgba(180,225,20,.08);border:1px solid rgba(180,225,20,.2);border-radius:2px;padding:0 3px}
.cm-tag{position:absolute;right:5px;top:5px;font-size:7px;color:#FFB800;font-weight:700}
.link-icon{font-size:9px;color:#444;margin-left:auto;flex-shrink:0}
/* Chart */
.br{display:flex;align-items:center;gap:5px;margin-bottom:3px}.bl{width:44px;font-size:9px;color:#778;text-align:right;flex-shrink:0}
.bt{flex:1;background:#0f1117;border-radius:2px;height:14px;overflow:hidden}.bf{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:4px}.bf span{font-size:8px;color:#fff;font-weight:700}
/* Common */
.cs{margin-top:12px;background:#1a1d27;border:1px solid rgba(255,184,0,.18);border-radius:12px;padding:12px}
.ct{font-size:12px;font-weight:700;color:#FFB800;margin-bottom:8px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.cc{background:#13151f;border:1px solid rgba(255,184,0,.2);border-radius:7px;padding:7px 8px;display:flex;align-items:center;gap:7px}
.cc .ci{width:28px;height:28px;border-radius:6px;object-fit:cover;background:#222530;flex-shrink:0}
.cc .cn{font-size:11px;font-weight:600;margin-bottom:1px}
/* Banner */
.bn{margin-bottom:12px;position:relative;overflow:hidden;border-radius:9px;height:52px;background:#1a1d27;border:1px solid #2a2d3a;display:flex;align-items:center}
.bn-tk{display:flex;transition:transform .4s;height:100%}
.bn-s{min-width:100%;height:100%;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.bn-s .si{width:32px;height:32px;border-radius:6px;object-fit:cover;background:#222530;flex-shrink:0;border:1px solid #2a2d3a}
.bn-s .sn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bn-s .ss{font-size:8px;font-weight:700;color:#FFB800}
.bn-s .srt{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.15);border-radius:8px;padding:1px 7px;font-size:9px;color:#FFB800;font-weight:700}
.bn-nv{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.35);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2}
.bn-nv.pv{left:3px}.bn-nv.nx{right:3px}
.bn-dt{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
.bn-dt span{width:4px;height:4px;border-radius:2px;background:#fff;opacity:.2;cursor:pointer}.bn-dt span.on{opacity:1;width:10px}
/* Nexon */
.nx-sec{margin-bottom:12px;background:linear-gradient(135deg,#1a1d27,#1c2210);border:1.5px solid #B4E114;border-radius:12px;padding:14px}
.nx-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.nx-logo{width:28px;height:28px;border-radius:6px;background:#B4E114;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#0f1117}
.nx-ti{font-size:14px;font-weight:800;color:#B4E114}.nx-su{font-size:10px;color:#7a8a3a}
.nx-st{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:10px}
.ns{background:rgba(15,17,23,.5);border:1px solid rgba(180,225,20,.12);border-radius:7px;padding:8px 10px}
.ns .nl{font-size:9px;color:#7a8a3a;margin-bottom:2px}.ns .nv{font-size:18px;font-weight:800;color:#B4E114}
/* Skeleton */
.sk{background:linear-gradient(90deg,#1a1d27 25%,#222530 50%,#1a1d27 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:7px;height:40px;margin-bottom:4px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Trend */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.tp{background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:12px}
.tp h3{font-size:12px;font-weight:700;margin-bottom:8px}
.fb{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.fl{width:90px;font-size:9px;color:#778;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ft{flex:1;background:#0f1117;border-radius:2px;height:12px;overflow:hidden}
.ff{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:4px}.ff span{font-size:7px;color:#fff;font-weight:700}
.footer{text-align:center;color:#2a2d3a;font-size:9px;margin-top:16px}
@media(max-width:640px){.g.two,.tg{grid-template-columns:1fr}.hdr{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="w">
<div class="hdr"><div><h1>📊 Store Featured Dashboard</h1><div class="sub" id="dL"></div></div><div class="tabs" id="mT"><button class="t sm a" onclick="sTab('d',this)">대시보드</button><button class="t sm" onclick="sTab('t',this)">📈 트렌드</button><button class="t sm" onclick="sTab('l',this)">📅 로그</button></div></div>
<div class="st" id="sB"><div class="d" id="sD" style="background:#FFB800"></div><span id="sM">로딩...</span></div>
<div id="dW">
<div id="sBar" style="display:flex;gap:5px;margin-bottom:10px"><button class="t sm a" onclick="sS('both',this)">전체</button><button class="t sm" onclick="sS('google',this)">Google Play</button><button class="t sm" onclick="sS('apple',this)">App Store</button></div>
<div class="tabs" id="cBar" style="margin-bottom:12px"></div>
<div class="nx-sec" id="nxS"></div>
<div class="bn" id="bnW"><div class="bn-tk" id="bnT"></div><button class="bn-nv pv" onclick="mBn(-1)">‹</button><button class="bn-nv nx" onclick="mBn(1)">›</button><div class="bn-dt" id="bnD"></div></div>
<div class="su" id="sm"></div>
<div class="g two" id="mG">
<div class="p" id="gP"><div class="ph"><div style="font-size:14px">▶</div><div><div class="pt">Google Play</div><div class="ps" id="gS"></div></div></div><div id="gL"></div><div style="font-size:10px;color:#555;font-weight:700;margin:8px 0 4px">장르 분포</div><div id="gC"></div></div>
<div class="p" id="aP"><div class="ph"><div style="font-size:14px"></div><div><div class="pt">App Store</div><div class="ps" id="aS"></div></div></div><div id="aL"></div><div style="font-size:10px;color:#555;font-weight:700;margin:8px 0 4px">장르 분포</div><div id="aC"></div></div>
</div>
<div class="cs" id="cmS"><div class="ct">★ 양쪽 동시 피쳐드</div><div class="cg" id="cmG"></div></div>
</div>
<div id="tW" style="display:none"></div>
<div id="lW" style="display:none"></div>
<div class="footer" id="ft"></div>
</div>
<script>
var CC={KR:'🇰🇷 한국',TW:'🇹🇼 대만',JP:'🇯🇵 일본',US:'🇺🇸 미국',TH:'🇹🇭 태국'};
var CS=Object.keys(CC);
var GC={액션:'#EF5B5B',전략:'#5B8DEF',퍼즐:'#A05BEF',스포츠:'#3DAAA0',RPG:'#E07B4F',캐주얼:'#EFC45B',시뮬레이션:'#5BEF8D',어드벤처:'#EF8D5B',리듬:'#EF5BAA',카드:'#5BEFEF'};

/* NEXON detection */
var NXD='nexon,neople,mintrocket,nat games'.split(',');
var NXK='블루 아카이브,blue archive,ブルーアーカイブ,蔚藍檔案,메이플 키우기,메이플스토리,maplestory,마비노기 모바일,mabinogi,瑪奇,던전앤파이터,dungeon & fighter,fc 온라인,fc online,fc모바일,히트2,hit2,the first descendant,퍼스트 디센던트,데이브 더 다이버,dave the diver,카트라이더,kartrider,v4,카운터사이드,counterside'.split(',');
function nm(n){return(n||'').replace(/[™:：\s]/g,'').toLowerCase();}
function isNX(a){if(!a)return false;var n=typeof a==='string'?a:a.name||'',d=typeof a==='object'?(a.dev||''):'';if(d){var dl=d.toLowerCase();if(NXD.some(function(x){return dl.includes(x);}))return true;}var nl=nm(n);return NXK.some(function(k){return nl===nm(k)||nl.includes(nm(k));});}

/* Storage */
var sto=(function(){function ok(){try{localStorage.setItem('_','1');localStorage.removeItem('_');return true;}catch(e){return false;}}if(ok())return{set:function(k,v){localStorage.setItem(k,v);},get:function(k){return localStorage.getItem(k);},del:function(k){localStorage.removeItem(k);},keys:function(p){var r=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(!p||k.indexOf(p)===0)r.push(k);}return r;}};var m={};return{set:function(k,v){m[k]=v;},get:function(k){return m[k]||null;},del:function(k){delete m[k];},keys:function(p){return Object.keys(m).filter(function(k){return!p||k.indexOf(p)===0;});}};})();

var D={};CS.forEach(function(c){D[c]={google:[],apple:[]};});
var cC='KR',cS='both',cT='d',bI=0,bTm=null;
function td(){return new Date().toISOString().slice(0,10);}

/* Load */
async function load(cc){
  var ck='day:'+td()+':'+cc,c=sto.get(ck);
  if(c){try{var d=JSON.parse(c);if((d.google&&d.google.length)||(d.apple&&d.apple.length)){D[cc]=d;return'cache';}}catch(e){}}
  try{var r=await fetch('/api/crawl?country='+cc);if(r.ok){var d=await r.json();if(d.google||d.apple){D[cc]={google:d.google||[],apple:d.apple||[]};sto.set(ck,JSON.stringify(D[cc]));snap();return'live';}}}catch(e){console.warn(cc,e);}
  var sn=sto.keys('snap:').sort().reverse();
  for(var i=0;i<sn.length;i++){try{var s=JSON.parse(sto.get(sn[i]));if(s[cc]&&(s[cc].google.length||s[cc].apple.length)){D[cc]=s[cc];return'snap';}}catch(e){}}
  return'empty';
}
function snap(){var p={};CS.forEach(function(c){p[c]={google:D[c].google,apple:D[c].apple};});sto.set('snap:'+td(),JSON.stringify(p));var k=sto.keys('snap:').sort();while(k.length>30)sto.del(k.shift());}

async function boot(){
  ss('#FFB800','로딩...');rCB();skel();
  var src=await load(cC);render();
  ss(src==='empty'?'#EF5B5B':'#5BEF8D',CC[cC]+' '+(src==='live'?'✅ 실시간':src==='cache'?'✅ 캐시':'📦 '+src));
  for(var i=0;i<CS.length;i++){if(CS[i]!==cC)await load(CS[i]);}
}
function skel(){var s='';for(var i=0;i<6;i++)s+='<div class="sk"></div>';document.getElementById('gL').innerHTML=s;document.getElementById('aL').innerHTML=s;}
function ss(c,m){document.getElementById('sD').style.background=c;document.getElementById('sM').textContent=m;}

/* Helpers */
function bg(g){var c=GC[g]||'#888';return g?'<span class="bdg" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+g+'</span>':'';}
function sr(r){return r?'<span class="sr">★'+r+'</span>':'';}
function tb(t){if(!t)return '';var c=t==='Today'?'today':t==='Games'?'games':'feat';return '<span class="tb-tag '+c+'">'+t+'</span>';}
function ic(u){return u?'<img class="ic" src="'+u+'" loading="lazy" onerror="this.className=\'ph-ic\';this.outerHTML=\'<div class=ph-ic>🎮</div>\'">':'<div class="ph-ic">🎮</div>';}
function isCm(n,g,a){return g.some(function(x){return nm(x.name)===nm(n);})&&a.some(function(x){return nm(x.name)===nm(n);});}

/* Render */
function rCB(){document.getElementById('cBar').innerHTML=CS.map(function(k){return'<button class="t'+(k===cC?' a':'')+'" onclick="pC(\''+k+'\')">'+CC[k]+'</button>';}).join('');}

function rRow(x,g,a,linkable){
  var c=isCm(x.name,g,a),nx=isNX(x),hasLink=linkable&&x.url;
  var tag=hasLink?'a':'div';
  var href=hasLink?' href="'+x.url+'" target="_blank"':'';
  return '<'+tag+' class="r'+(nx?' nx':'')+(c?' cm':'')+'"'+href+'>'
    +(nx?'<span class="nx-tag">NEXON</span>':c?'<span class="cm-tag">양쪽</span>':'')
    +'<div class="rk">'+x.rank+'</div>'+ic(x.icon)
    +'<div class="inf"><div class="nm">'+x.name+'</div>'
    +'<div class="mt">'+tb(x.tab)+bg(x.genre)+(x.dev?'<span class="dv">'+x.dev+'</span>':'')+(x.section?'<span class="sl">'+x.section+'</span>':'')+sr(x.rating)+'</div></div>'
    +(hasLink?'<span class="link-icon">↗</span>':'')
    +'</'+tag+'>';
}

function rList(id,data,g,a){
  if(!data.length){document.getElementById(id).innerHTML='<div style="text-align:center;padding:20px;color:#333;font-size:11px">수집 대기...</div>';return;}
  // Tab별 그룹핑
  var today=data.filter(function(x){return x.tab==='Today';}),
      games=data.filter(function(x){return x.tab==='Games';}),
      other=data.filter(function(x){return x.tab!=='Today'&&x.tab!=='Games';});
  var h='';
  if(today.length){h+='<div class="tab-hdr"> Today Tab ('+today.length+')</div>';today.forEach(function(x){h+=rRow(x,g,a,x.rank<=10);});}
  if(games.length){h+='<div class="tab-hdr"> Games Tab ('+games.length+')</div>';games.forEach(function(x){h+=rRow(x,g,a,x.rank<=10);});}
  if(other.length){
    if(today.length||games.length)h+='<div class="tab-hdr">기타 ('+other.length+')</div>';
    other.forEach(function(x){h+=rRow(x,g,a,x.rank<=10);});
  }
  if(!today.length&&!games.length&&!other.length) h='<div style="color:#333;font-size:11px;text-align:center;padding:16px">없음</div>';
  document.getElementById(id).innerHTML=h;
}

function rListGP(id,data,g,a){
  if(!data.length){document.getElementById(id).innerHTML='<div style="text-align:center;padding:20px;color:#333;font-size:11px">수집 대기...</div>';return;}
  var h='';
  data.forEach(function(x){h+=rRow(x,g,a,x.rank<=10);});
  document.getElementById(id).innerHTML=h;
}

function rChart(id,data){
  var c={};data.forEach(function(a){if(a.genre)c[a.genre]=(c[a.genre]||0)+1;});
  var s=Object.entries(c).sort(function(a,b){return b[1]-a[1];}),mx=s[0]?s[0][1]:1;
  document.getElementById(id).innerHTML=s.map(function(e){return'<div class="br"><div class="bl">'+e[0]+'</div><div class="bt"><div class="bf" style="width:'+Math.round(e[1]/mx*100)+'%;background:'+(GC[e[0]]||'#5B8DEF')+'"><span>'+e[1]+'</span></div></div></div>';}).join('');
}

function render(){
  var d=D[cC],dt=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dL').textContent=dt+' · '+CC[cC];
  document.getElementById('ft').textContent='App Store + Google Play · '+dt;
  var cm=d.google.filter(function(x){return isCm(x.name,d.google,d.apple);});
  var all=d.google.concat(d.apple),rated=all.filter(function(x){return x.rating>0;});
  var avg=rated.length?(rated.reduce(function(s,a){return s+a.rating;},0)/rated.length).toFixed(1):'—';
  document.getElementById('sm').innerHTML='<div class="sc"><div class="l">Google Play</div><div class="v" style="color:#34A853">'+d.google.length+'</div></div><div class="sc"><div class="l">App Store</div><div class="v" style="color:#5B8DEF">'+d.apple.length+'</div></div><div class="sc"><div class="l">공통</div><div class="v" style="color:#FFB800">'+cm.length+'</div></div><div class="sc"><div class="l">평균 평점</div><div class="v" style="color:#EF5B5B">★'+avg+'</div></div>';
  rList('aL',d.apple,d.google,d.apple);
  rListGP('gL',d.google,d.google,d.apple);
  rChart('gC',d.google);rChart('aC',d.apple);
  document.getElementById('gS').textContent=CC[cC]+' '+d.google.length+'개';
  document.getElementById('aS').textContent=CC[cC]+' '+d.apple.length+'개';
  document.getElementById('cmG').innerHTML=cm.length?cm.map(function(a){var nx=isNX(a);return'<div class="cc" style="'+(nx?'border-color:#B4E114':'')+'">'+(a.icon?'<img class="ci" src="'+a.icon+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div><div class="cn" style="'+(nx?'color:#B4E114':'')+'">'+a.name+'</div><div style="display:flex;gap:3px;align-items:center">'+bg(a.genre)+sr(a.rating)+'</div></div></div>';}).join(''):'<div style="color:#444;font-size:10px">없음</div>';
  document.getElementById('gP').style.display=(cS==='both'||cS==='google')?'':'none';
  document.getElementById('aP').style.display=(cS==='both'||cS==='apple')?'':'none';
  document.getElementById('cmS').style.display=cS==='both'?'':'none';
  document.getElementById('mG').className='g '+(cS==='both'?'two':'one');
  rBn();rNX();
}

/* Banner */
function rBn(){
  var d=D[cC],b=[];
  d.apple.slice(0,3).forEach(function(a){b.push({name:a.name,sec:' '+a.tab+' · '+a.section,rt:a.rating,ic:a.icon});});
  d.google.slice(0,3).forEach(function(a){b.push({name:a.name,sec:'▶ GP · '+a.section,rt:a.rating,ic:a.icon});});
  if(!b.length)b=[{name:'로딩 중...',sec:'',rt:0,ic:''}];
  document.getElementById('bnT').innerHTML=b.map(function(x){return'<div class="bn-s">'+(x.ic?'<img class="si" src="'+x.ic+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div style="flex:1;min-width:0"><div class="ss">'+x.sec+'</div><div class="sn">'+x.name+'</div></div>'+(x.rt?'<div class="srt">★'+x.rt+'</div>':'')+'</div>';}).join('');
  document.getElementById('bnD').innerHTML=b.map(function(_,i){return'<span class="'+(i===bI?'on':'')+'" onclick="gBn('+i+')"></span>';}).join('');
  uBn();clearInterval(bTm);bTm=setInterval(function(){mBn(1);},4000);
}
function uBn(){document.getElementById('bnT').style.transform='translateX(-'+bI*100+'%)';var d=document.querySelectorAll('.bn-dt span');for(var i=0;i<d.length;i++)d[i].className=i===bI?'on':'';}
function mBn(dir){var d=D[cC],n=Math.min(6,d.apple.length+d.google.length)||1;bI=(bI+dir+n)%n;uBn();}
function gBn(i){bI=i;uBn();}

/* Nexon */
function rNX(){
  var d=D[cC],all=d.google.concat(d.apple),nx=all.filter(function(a){return isNX(a);});
  var uq={};nx.forEach(function(a){var k=nm(a.name);if(!uq[k])uq[k]=a;});
  var nl=Object.values(uq),nc=nl.length;
  if(!nc){document.getElementById('nxS').style.display='none';return;}
  document.getElementById('nxS').style.display='';
  document.getElementById('nxS').innerHTML='<div class="nx-h"><div class="nx-logo">N</div><div><div class="nx-ti">NEXON 피쳐드</div><div class="nx-su">'+CC[cC]+' GP '+d.google.filter(function(a){return isNX(a);}).length+' + AS '+d.apple.filter(function(a){return isNX(a);}).length+'</div></div></div>'
  +'<div class="nx-st"><div class="ns"><div class="nl">피쳐드</div><div class="nv">'+nc+'</div></div><div class="ns"><div class="nl">최고순위</div><div class="nv">#'+Math.min.apply(null,nx.map(function(a){return a.rank;}))+'</div></div><div class="ns"><div class="nl">평균평점</div><div class="nv">★'+(nl.reduce(function(s,a){return s+(a.rating||0);},0)/nc).toFixed(1)+'</div></div></div>'
  +nl.map(function(a){var hl=a.url&&a.rank<=10;return'<'+(hl?'a href="'+a.url+'" target="_blank"':'div')+' class="r nx" style="margin-bottom:3px"><div class="rk">'+a.rank+'</div>'+ic(a.icon)+'<div class="inf"><div class="nm" style="color:#B4E114">'+a.name+'</div><div class="mt">'+tb(a.tab)+bg(a.genre)+(a.dev?'<span class="dv">'+a.dev+'</span>':'')+sr(a.rating)+'</div></div>'+(hl?'<span class="link-icon">↗</span>':'')+'</'+(hl?'a':'div')+'>';}).join('');
}

/* Nav */
async function pC(c){cC=c;rCB();skel();var src=await load(c);render();ss(src==='empty'?'#EF5B5B':'#5BEF8D',CC[c]+' '+(src==='live'?'✅ 실시간':src==='cache'?'✅ 캐시':'📦 '+src));}
function sS(s,b){cS=s;document.querySelectorAll('#sBar .t').forEach(function(x){x.classList.remove('a');});b.classList.add('a');render();}
function sTab(t,b){cT=t;document.querySelectorAll('#mT .t').forEach(function(x){x.classList.remove('a');});b.classList.add('a');document.getElementById('dW').style.display=t==='d'?'':'none';document.getElementById('tW').style.display=t==='t'?'':'none';document.getElementById('lW').style.display=t==='l'?'':'none';if(t==='t')rTr();if(t==='l')rLg();}

/* Trend */
var tS='s';
function rTr(){
  var h='<div class="tabs" style="margin-bottom:10px"><button class="t sm'+(tS==='s'?' a':'')+'" onclick="tS=\'s\';rTr()">'+CC[cC]+'</button><button class="t sm'+(tS==='a'?' a':'')+'" onclick="tS=\'a\';rTr()">🌏 전체</button></div>';
  var d=D[cC],all=d.google.concat(d.apple);
  if(tS==='a'){all=[];CS.forEach(function(c){all=all.concat(D[c].google,D[c].apple);});}
  var gG={},aG={};
  var src=tS==='s'?[D[cC]]:CS.map(function(c){return D[c];});
  src.forEach(function(d){d.google.forEach(function(a){if(a.genre)gG[a.genre]=(gG[a.genre]||0)+1;});d.apple.forEach(function(a){if(a.genre)aG[a.genre]=(aG[a.genre]||0)+1;});});
  var gs=Object.keys(Object.assign({},gG,aG)).sort(function(a,b){return(gG[b]||0)+(aG[b]||0)-(gG[a]||0)-(aG[a]||0);});
  var gmx=Math.max.apply(null,gs.map(function(g){return Math.max(gG[g]||0,aG[g]||0);}));if(gmx<1)gmx=1;
  h+='<div class="tg"><div class="tp"><h3>장르</h3>'+gs.map(function(g){var gv=gG[g]||0,av=aG[g]||0,c=GC[g]||'#888';return'<div style="margin-bottom:4px"><div style="font-size:10px;color:'+c+';font-weight:700">'+g+'</div><div style="display:flex;gap:3px;align-items:center"><div style="width:20px;font-size:8px;color:#34A853">GP</div><div style="flex:1;background:#0f1117;border-radius:1px;height:8px;overflow:hidden"><div style="width:'+Math.round(gv/gmx*100)+'%;height:100%;background:#34A853"></div></div><div style="width:12px;font-size:8px;color:#666">'+gv+'</div></div><div style="display:flex;gap:3px;align-items:center;margin-top:1px"><div style="width:20px;font-size:8px;color:#5B8DEF">AS</div><div style="flex:1;background:#0f1117;border-radius:1px;height:8px;overflow:hidden"><div style="width:'+Math.round(av/gmx*100)+'%;height:100%;background:#5B8DEF"></div></div><div style="width:12px;font-size:8px;color:#666">'+av+'</div></div></div>';}).join('')+'</div>';
  var f={};all.forEach(function(a){if(!a.name)return;var k=nm(a.name);if(!f[k])f[k]={name:a.name,c:0,nx:isNX(a)};f[k].c++;});
  var tp=Object.values(f).sort(function(a,b){return b.c-a.c;}).slice(0,10),fmx=tp[0]?tp[0].c:1;
  h+='<div class="tp"><h3>빈도</h3>'+tp.map(function(a){return'<div class="fb"><div class="fl" style="'+(a.nx?'color:#B4E114':'')+'">'+a.name+'</div><div class="ft"><div class="ff" style="width:'+Math.round(a.c/fmx*100)+'%;background:'+(a.nx?'linear-gradient(90deg,#B4E114,#7a8a3a)':'linear-gradient(90deg,#5B8DEF,#A05BEF)')+'"><span>'+a.c+'</span></div></div></div>';}).join('')+'</div></div>';
  document.getElementById('tW').innerHTML=h;
}

/* Log */
function rLg(){
  var sn=sto.keys('snap:').sort().reverse();
  if(!sn.length){document.getElementById('lW').innerHTML='<div style="text-align:center;padding:30px;color:#444">📭 자동 저장 대기</div>';return;}
  var h='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap"><select id="lC" onchange="rLg()" style="background:#1a1d27;border:1px solid #2a2d3a;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px">'+CS.map(function(c){return'<option value="'+c+'">'+CC[c]+'</option>';}).join('')+'</select><select id="lSt" onchange="rLg()" style="background:#1a1d27;border:1px solid #2a2d3a;color:#fff;border-radius:6px;padding:4px 8px;font-size:12px"><option value="google">GP</option><option value="apple">AS</option></select></div>';
  var lc=(document.getElementById('lC')||{}).value||'KR',ls=(document.getElementById('lSt')||{}).value||'google';
  var cards=sn.map(function(k){try{var s=JSON.parse(sto.get(k));return{date:k.replace('snap:',''),list:(s[lc]&&s[lc][ls])||[]};}catch(e){return{date:k.replace('snap:',''),list:[]};}});
  cards.forEach(function(c){
    h+='<div style="background:#1a1d27;border:1px solid #2a2d3a;border-radius:10px;padding:12px;margin-bottom:8px"><div style="font-weight:700;font-size:13px;margin-bottom:8px">📅 '+c.date+'</div>';
    if(c.list.length){c.list.slice(0,10).forEach(function(a){
      var nx=isNX(a),hl=a.url&&a.rank<=10;
      h+='<'+(hl?'a href="'+a.url+'" target="_blank"':'div')+' class="r'+(nx?' nx':'')+'" style="margin-bottom:2px"><div class="rk">'+a.rank+'</div>'+ic(a.icon)+'<div class="inf"><div class="nm" style="font-size:11px;'+(nx?'color:#B4E114':'')+'">'+a.name+'</div><div class="mt">'+tb(a.tab)+bg(a.genre)+(a.dev?'<span class="dv">'+a.dev+'</span>':'')+sr(a.rating)+'</div></div>'+(hl?'<span class="link-icon">↗</span>':'')+'</'+(hl?'a':'div')+'>';
    });}else h+='<div style="color:#444;font-size:10px">없음</div>';
    h+='</div>';
  });
  document.getElementById('lW').innerHTML=h;
}

boot();
</script>
</body>
